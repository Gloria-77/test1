<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QA Work English Check-in</title>
    <meta name="theme-color" content="#f7f8fa" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="test1" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css?v=29" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="学习天数">
        <div class="brand">
          <span class="brand-mark">Q</span>
          <div>
            <h1>test1</h1>
            <p>外企测试英语打卡</p>
          </div>
        </div>

        <div class="stats-grid">
          <div>
            <span id="completedDays">0</span>
            <label>完成天数</label>
          </div>
          <div>
            <span id="totalMinutes">0</span>
            <label>累计分钟</label>
          </div>
          <div>
            <span id="streakDays">0</span>
            <label>连续打卡</label>
          </div>
        </div>

        <div class="day-tools">
          <button class="icon-button" id="prevDay" aria-label="上一天" title="上一天">‹</button>
          <select id="daySelect" aria-label="选择学习天数"></select>
          <button class="icon-button" id="nextDay" aria-label="下一天" title="下一天">›</button>
        </div>

        <div class="progress-wrap">
          <div class="progress-label">
            <span>今日进度</span>
            <strong id="taskProgressText">0%</strong>
          </div>
          <div class="progress-bar" aria-hidden="true">
            <span id="taskProgressBar"></span>
          </div>
        </div>

        <div class="sidebar-note">
          <strong>规则</strong>
          <p>每天完成任务、填写时长和复盘，点击“完成今日打卡”。进度会保存在本机浏览器。</p>
        </div>
      </aside>

      <main class="main">
        <section class="topbar">
          <div>
            <p class="eyebrow" id="phaseLabel">第 1 周</p>
            <h2 id="dayTitle">第一天</h2>
          </div>
          <button id="completeDayButton" class="primary-button">完成今日打卡</button>
        </section>

        <section class="layout">
          <div class="content-column">
            <section class="panel">
              <div class="panel-heading">
                <h3>今日目标</h3>
                <span id="targetBand">工作基础</span>
              </div>
              <ul id="goalsList" class="clean-list"></ul>
            </section>

            <section class="panel">
              <div class="panel-heading">
                <h3>学习任务</h3>
                <span>勾选完成项</span>
              </div>
              <div id="tasksList" class="task-list"></div>
            </section>

            <section class="panel">
              <div class="panel-heading">
                <h3>工作英语内容</h3>
                <span id="contentHint">跟着练</span>
              </div>
              <div id="studyContent" class="study-content"></div>
            </section>
          </div>

          <div class="checkin-column">
            <section class="panel compact-panel">
              <h3>今日记录</h3>
              <label class="field-label" for="minutesInput">学习时长（分钟）</label>
              <input id="minutesInput" class="text-input" type="number" min="0" max="240" step="5" placeholder="120" />

              <label class="field-label" for="difficultySelect">今天难度</label>
              <select id="difficultySelect" class="text-input">
                <option value="">选择</option>
                <option value="easy">轻松</option>
                <option value="ok">刚好</option>
                <option value="hard">偏难</option>
              </select>

              <label class="field-label" for="noteInput">复盘笔记</label>
              <textarea id="noteInput" class="text-area" rows="7" placeholder="今天哪句工作英语最想用？哪一句读不顺？"></textarea>
            </section>

            <section class="panel compact-panel">
              <h3>错题 / 卡点</h3>
              <textarea id="blockerInput" class="text-area" rows="6" placeholder="例如：requirement 发音不顺；expected 和 actual 容易说反。"></textarea>
            </section>

            <section class="panel compact-panel">
              <h3>本周提醒</h3>
              <div id="weeklyReminder" class="reminder"></div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <script src="./script.js?v=29"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
